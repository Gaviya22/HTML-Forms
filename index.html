<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container py-5">

    <div class="form-box shadow-lg">

        <div class="row g-0">

            <div class="col-lg-8 p-5 text-white">

                <h1 class="fw-bold mb-3">
                    Contact form
                </h1>

                <p class="mb-5">
                    Please fill in your information and we'll be sending your order in no time.
                </p>

                <form>

                    <div class="row mb-3">

                        <label class="col-sm-3 col-form-label">
                            Your Name
                        </label>

                        <div class="col-sm-9">

                            <div class="row">

                                <div class="col">

                                    <input type="text" class="form-control" placeholder="First Name">

                                </div>

                                <div class="col">

                                    <input type="text" class="form-control" placeholder="Last Name">

                                </div>

                            </div>

                        </div>

                    </div>

                    <div class="row mb-3">

                        <label class="col-sm-3 col-form-label">
                            Your Email
                        </label>

                        <div class="col-sm-9">

                            <input type="email" class="form-control" placeholder="e.g. hello@contact.net">

                        </div>

                    </div>

                    <div class="row mb-3">

                        <label class="col-sm-3 col-form-label">
                            Phone*
                        </label>

                        <div class="col-sm-9">

                            <div class="row">

                                <div class="col">

                                    <input type="text" class="form-control" placeholder="###">

                                </div>

                                <div class="col">

                                    <input type="text" class="form-control" placeholder="###">

                                </div>

                                <div class="col">

                                    <input type="text" class="form-control" placeholder="####">

                                </div>

                            </div>

                        </div>

                    </div>

                    <div class="row mb-3">

                        <label class="col-sm-3 col-form-label">
                            Message Subject *
                        </label>

                        <div class="col-sm-9">

                            <select class="form-select">

                                <option>Other</option>
                                <option>Support</option>
                                <option>Sale</option>

                            </select>

                        </div>

                    </div>

                    <div class="row mb-3">

                        <label class="col-sm-3 col-form-label">
                            Message *
                        </label>

                        <div class="col-sm-9">

                            <textarea class="form-control" rows="4"></textarea>

                        </div>

                    </div>

                    <div class="row mb-4">

                        <label class="col-sm-3 col-form-label">
                            Verification *
                        </label>

                        <div class="col-sm-9">

                            <div class="captcha">

                                <input class="form-check-input" type="checkbox">

                                <span>I'm not a robot</span>

                            </div>

                        </div>

                    </div>

                    <hr>

                    <button class="btn btn-outline-light px-5 py-2 fw-bold">
                        SUBMIT FORM 
                    </button>

                </form>

            </div>

        </div>

    </div>

    </div>

</body>
</html>
